<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 44" fill="none">
  <!-- Mascot: cute document character -->
  <g transform="translate(2, 2)">
    <!-- Body (document shape) -->
    <rect x="0" y="0" width="28" height="36" rx="4" fill="#6366f1"/>
    <!-- Folded corner -->
    <path d="M19 0v6a3 3 0 003 3h6" fill="#4f46e5"/>
    <path d="M19 0l9 9" stroke="#818cf8" stroke-width="0.5" opacity="0.5"/>
    <!-- Face -->
    <!-- Left eye -->
    <ellipse cx="10" cy="15" rx="3" ry="3.2" fill="white"/>
    <ellipse cx="10.8" cy="14.6" rx="1.5" ry="1.6" fill="#1e1b4b"/>
    <ellipse cx="11.4" cy="13.8" rx="0.5" ry="0.5" fill="white"/>
    <!-- Right eye -->
    <ellipse cx="20" cy="15" rx="3" ry="3.2" fill="white"/>
    <ellipse cx="20.8" cy="14.6" rx="1.5" ry="1.6" fill="#1e1b4b"/>
    <ellipse cx="21.4" cy="13.8" rx="0.5" ry="0.5" fill="white"/>
    <!-- Mouth (happy smile) -->
    <path d="M11 22c1.5 2.5 5.5 2.5 7 0" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Blush -->
    <ellipse cx="7" cy="20" rx="2" ry="1.2" fill="#a5b4fc" opacity="0.5"/>
    <ellipse cx="23" cy="20" rx="2" ry="1.2" fill="#a5b4fc" opacity="0.5"/>
    <!-- Document lines (on belly) -->
    <line x1="7" y1="28" x2="21" y2="28" stroke="#a5b4fc" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <line x1="7" y1="31" x2="16" y2="31" stroke="#a5b4fc" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
    <!-- Little arms -->
    <path d="M-2 20c-2 0-3 2-2 3.5" stroke="#6366f1" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M30 20c2 0 3 2 2 3.5" stroke="#6366f1" stroke-width="2" stroke-linecap="round" fill="none"/>
  </g>
  <!-- Wordmark -->
  <text x="46" y="30" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="800" fill="currentColor" letter-spacing="-0.8">
    Faktur
  </text>
</svg>
