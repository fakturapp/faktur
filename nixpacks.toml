# Nixpacks config for Dokploy deployment
# Backend (AdonisJS) on port 3333 + Frontend (Next.js) on port 3000

[phases.setup]
aptPkgs = ["libnss3", "libgbm1", "libasound2t64", "libpangocairo-1.0-0", "libgtk-3-0", "libxss1", "libxshmfence1", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2"]

[phases.build]
cmds = [
  "npx turbo run build",
  "cp apps/backend/.env apps/backend/build/.env 2>/dev/null || true",
  "cd apps/backend/build && npm install --omit=dev"
]

[start]
cmd = "cd apps/backend/build && node ace migration:run --force; node ace list:routes 2>&1 | head -100 || true; node bin/server.js & cd /app/apps/frontend && npx next start -p 3000 -H 0.0.0.0"
