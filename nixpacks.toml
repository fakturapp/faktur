# Nixpacks config for Dokploy deployment
# Backend (AdonisJS) :3333 + Frontend (Next.js) :3000 + Docs :3001 + Platform :3002

[phases.setup]
aptPkgs = ["libnss3", "libgbm1", "libasound2t64", "libpangocairo-1.0-0", "libgtk-3-0", "libxss1", "libxshmfence1", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2", "unzip"]

[phases.build]
cmds = [
  "npx turbo run build",
  "cp apps/backend/.env apps/backend/build/.env 2>/dev/null || true",
  "cd apps/backend/build && npm install --omit=dev"
]

[start]
cmd = "cd /app/apps/backend/build && node ace migration:run --force; node ace list:routes || true; node bin/server.js & cd /app/apps/frontend && npx next start -p 3000 -H 0.0.0.0 & cd /app/apps/docs && npx next start -p 3001 -H 0.0.0.0 & cd /app/apps/platform && npx next start -p 3002 -H 0.0.0.0 & wait"
